<!DOCTYPE html>
<html>
  <body style="width:300px; padding:10px; font-family:Arial;">
    
    <button id="generate">Generate Message</button>

<div id="status" style="font-size:12px; color:gray; margin-top:5px;"></div>

<div id="option1-section">
  <div style="font-size:11px; color:gray; margin-bottom:4px;">Option 1 - Experience</div>
  <div id="option1-output" style="margin-top:10px; white-space: normal; word-wrap: break-word; font-size: 14px;"></div>
  <button id="option1-copy" style="display:none; margin-top:6px; padding:4px 8px; font-size:12px; cursor:pointer;">Copy</button>
</div>

<div id="option2-section" style="margin-top:15px;">
  <div style="font-size:11px; color:gray; margin-bottom:4px;">Option 2 - Recent Post</div>
  <div id="option2-output" style="margin-top:10px; white-space: normal; word-wrap: break-word; font-size: 14px;"></div>
  <button id="option2-copy" style="display:none; margin-top:6px; padding:4px 8px; font-size:12px; cursor:pointer;">Copy</button>
</div>

<div id="closing-section" style="margin-top:15px; border-top: 1px solid #eee; padding-top:10px;">
  <div style="font-size:11px; color:gray; margin-bottom:4px;">Custom message (auto-saved)</div>
  <textarea id="closing-message" rows="3" placeholder="Add any custom text to append to your message..."
    style="width:100%; font-size:13px; box-sizing:border-box; resize:vertical;"></textarea>
  <div id="char-count" style="font-size:11px; color:gray; margin-top:3px; text-align:right;">0 / 300 chars</div>
</div>

    <!-- ✅ ORDER MATTERS -->
    <script src="config.js"></script>
    <script src="popup.js"></script>

  </body>
</html>
