<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>LinkedIn Copilot Settings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
        background: #fafafa;
        color: #1a1a1a;
        padding: 40px 20px;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
        color: #1a1a1a;
      }
      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 24px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        font-size: 14px;
        border: 1.5px solid #e3e3e3;
        border-radius: 10px;
        font-family: monospace;
        transition: all 0.25s;
      }
      input:focus {
        outline: none;
        border-color: #1a5490;
        box-shadow: 0 0 0 3px rgba(26, 84, 144, 0.08), 0 3px 12px rgba(26, 84, 144, 0.1);
      }
      .helper-text {
        font-size: 12px;
        color: #666;
        margin-top: 6px;
        line-height: 1.5;
      }
      .helper-text a {
        color: #1a5490;
        text-decoration: none;
      }
      .helper-text a:hover {
        text-decoration: underline;
      }
      button {
        width: 100%;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 600;
        color: white;
        background: #1a5490;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.25s;
      }
      button:hover {
        background: #0f3a7d;
        box-shadow: 0 4px 12px rgba(26, 84, 144, 0.2);
      }
      button:active {
        transform: translateY(1px);
      }
      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 13px;
        text-align: center;
        display: none;
      }
      .status.success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #a7f3d0;
        display: block;
      }
      .status.error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>LinkedIn Copilot Settings</h1>
      <div class="subtitle">Configure your API key to generate personalized messages</div>

      <form id="settings-form">
        <div class="form-group">
          <label for="api-key">Groq API Key</label>
          <input
            type="password"
            id="api-key"
            placeholder="gsk_..."
            required
          >
          <div class="helper-text">
            Get your free API key from <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a>.
            Your key is stored locally and never sent anywhere except to Groq.
          </div>
        </div>

        <button type="submit">Save Settings</button>
        <div id="status" class="status"></div>
      </form>
    </div>

    <script src="options.js"></script>
  </body>
</html>
